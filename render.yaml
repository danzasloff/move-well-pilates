services:
  - type: web
    name: move-well-pilates
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: APP_STATE_KEY
        value: move-well-default
      - key: ADMIN_USERS_JSON
        sync: false
      - key: INQUIRY_WEBHOOK_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: INQUIRY_TO_EMAIL
        value: shane@movewellseattle.com
      - key: SQUARE_ENV
        value: sandbox
      - key: SQUARE_VERSION
        value: 2025-10-16
      # Set these securely in Render dashboard, not in git:
      # SUPABASE_URL
      # SUPABASE_SERVICE_ROLE_KEY
      # SQUARE_CLIENT_ID
      # SQUARE_CLIENT_SECRET
      # SQUARE_REDIRECT_URI
